<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encuesta de Salud</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <div class="contenedor">
        <h1>Encuesta de Salud 🩺</h1>
        <p class="subtitulo">Completa la siguiente información</p>

        <form id="formulario">

            <div class="grupo">
                <label>Nombre completo</label>
                <input type="text" placeholder="Escribe tu nombre" required>
            </div>

            <div class="grupo">
                <label>Edad (1 - 120 años)</label>
                <input type="number" id="edad" min="1" max="120" required>
            </div>

            <div class="grupo">
                <label>Peso (30 - 250 kg)</label>
                <input type="number" id="peso" min="30" max="250" required>
            </div>

            <div class="grupo">
                <label>Estatura (100 - 230 cm)</label>
                <input type="number" id="estatura" min="100" max="230" required>
            </div>

            <div class="grupo">
                <label>Nivel de dolor: <span id="valorDolor">5</span></label>
                <input type="range" id="dolor" min="0" max="10" value="5">
            </div>

            <div class="grupo">
                <label>Tipo de sangre</label>
                <select required>
                    <option value="">Selecciona una opción</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                    <option>O+</option>
                    <option>O-</option>
                </select>
            </div>

            <div class="grupo">
                <label>Código Postal (5 números)</label>
                <input
                    type="text"
                    id="cp"
                    pattern="[0-9]{5}"
                    maxlength="5"
                    placeholder="Ejemplo: 51000"
                    required
                >
                <small>Debe contener exactamente 5 números</small>
            </div>

            <button type="submit">Enviar Encuesta</button>

        </form>

        <p id="mensaje"></p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
